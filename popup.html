<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 15px; width: 320px; background-color: #f8f9fa; margin: 0;}
    h3 { margin-top: 0; color: #b71a1a; text-align: center; border-bottom: 2px solid #ccc; padding-bottom: 8px;}
    label.title { font-size: 12px; font-weight: bold; margin-top: 10px; display: block; color: #333;}
    input[type="text"], input[type="password"] { width: 100%; margin-bottom: 8px; margin-top: 4px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; outline: none;}
    input:focus { border-color: #0056b3; }
    
    .password-wrapper { position: relative; width: 100%; }
    .password-wrapper input { padding-right: 35px; } /* Chừa chỗ cho con mắt */
    .eye-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }

    .setting-item { display: flex; align-items: center; margin-top: 10px; cursor: pointer; padding: 6px; background: #fff; border: 1px solid #eee; border-radius: 5px; transition: 0.2s; }
    .setting-item:hover { background: #f1f3f5; }
    .setting-item input { margin-right: 10px; width: 16px; height: 16px; cursor: pointer; }
    .setting-item span { font-size: 13px; color: #444; }

    button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.2s; }
    button:hover { background-color: #004494; }
    #status { font-size: 13px; text-align: center; margin-top: 8px; font-weight: bold; min-height: 18px; }
  </style>
</head>
<body>
  <h3>⚙️ Cài đặt IUH Sync</h3>

  <label class="title">🔗 Link Google Apps Script:</label>
  <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/...">

  <label class="title">👤 Thông tin đăng nhập:</label>
  <input type="text" id="username" placeholder="Mã số sinh viên (Vd: 20xxxxxx)">
  <div class="password-wrapper">
    <input type="password" id="password" placeholder="Mật khẩu">
    <span class="eye-icon" id="togglePassword" title="Hiện mật khẩu">
      <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
        <line x1="1" y1="1" x2="23" y2="23"></line>
      </svg>
    </span>
  </div>

  <label class="setting-item">
    <input type="checkbox" id="autoFillInfo">
    <span>Tự động điền MSSV & Mật khẩu</span>
  </label>
  <label class="setting-item">
    <input type="checkbox" id="autoCaptcha">
    <span>Tự động giải mã CAPTCHA</span>
  </label>
  <label class="setting-item">
    <input type="checkbox" id="autoClickLogin">
    <span>Tự động bấm nút Đăng nhập</span>
  </label>

  <button id="saveBtn">LƯU CÀI ĐẶT</button>
  <p id="status"></p>
  
  <script src="popup.js"></script>
</body>
</html>
